<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada Bank — Open your account (mobile)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--brand:#5B2CE0;--brand-2:#7B4DFF;--brand-dk:#2E1A6B;--navy:#1c1440;--pos:#12B76A;--ink:#1A1730;--muted:#6c6885;--line:#ECE9F5;--bg:#f4f2fb}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
       background:radial-gradient(1100px 760px at 50% -8%, #f5f1ff 0%, #e9e1fb 48%, #dcd3f4 100%);
       display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:var(--ink)}
  .viewswitch{position:fixed;bottom:16px;left:16px;z-index:120;display:flex;gap:2px;background:#fff;border:1px solid #e7e4f2;border-radius:999px;padding:3px;box-shadow:0 4px 14px rgba(46,26,107,.14)}
  .viewswitch a{font-size:12px;color:#6c6885;text-decoration:none;padding:6px 13px;border-radius:999px}
  .viewswitch a.on{background:var(--brand);color:#fff;font-weight:600}
  .hint{position:fixed;bottom:18px;right:18px;z-index:110;color:#6b6a86;font-size:12px;max-width:230px;text-align:right}
  .hint b{color:var(--brand)}

  .phone{position:relative;width:390px;height:min(844px,94vh);background:#000;border-radius:54px;padding:13px;
         box-shadow:0 0 0 2px #2a2740,0 0 0 5px #14121f,0 30px 70px rgba(46,26,107,.34),0 8px 24px rgba(46,26,107,.22)}
  .screen{position:relative;width:100%;height:100%;background:#fff;border-radius:42px;overflow:hidden;display:flex;flex-direction:column}
  .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:20px;z-index:60}
  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px 4px;font-size:13px;font-weight:600;flex:0 0 auto}
  .statusbar .r{display:flex;align-items:center;gap:6px;font-size:11px}
  .bat{display:inline-block;width:22px;height:11px;border:1px solid #999;border-radius:3px;position:relative}
  .bat::after{content:"";position:absolute;left:1px;top:1px;bottom:1px;width:80%;background:#111;border-radius:1px}
  /* browser chrome (this is a PWA running in the mobile browser) */
  .urlbar{display:flex;align-items:center;gap:8px;margin:4px 12px 8px;background:#eeecf4;border-radius:11px;padding:8px 12px;font-size:12.5px;color:#6b6784;flex:0 0 auto}
  .urlbar .lock{color:var(--pos)}
  .urlbar .u{flex:1;text-align:center;color:#3a3550;font-weight:600}

  /* app header inside PWA */
  .apphead{flex:0 0 auto;padding:6px 16px 12px;border-bottom:1px solid var(--line)}
  .approw{display:flex;align-items:center;gap:10px}
  .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--brand-2),var(--brand));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
  .approw .lg{font-size:14px;font-weight:700}.approw .lg span{color:var(--muted);font-weight:400}
  .approw .close{margin-left:auto;color:var(--muted);font-size:20px;text-decoration:none;line-height:1}
  .prog{display:flex;align-items:center;gap:10px;margin-top:11px}
  .ring{width:34px;height:34px;flex:0 0 auto;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:var(--brand)}
  .prog .pt{font-size:13px;font-weight:700}
  .prog .pt small{display:block;font-size:10.5px;color:var(--muted);font-weight:500}

  .appbody{flex:1;overflow-y:auto;padding:16px 16px 90px}
  .appbody::-webkit-scrollbar{display:none}
  .step h2{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1.2;margin-bottom:8px}
  .step p.sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}

  .check{display:flex;gap:10px;align-items:flex-start;padding:7px 0;font-size:13.5px;line-height:1.4}
  .check .ok{width:20px;height:20px;border-radius:50%;background:rgba(18,183,106,.14);color:var(--pos);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:12px;font-weight:800}
  .check b{font-weight:700}
  .needs{margin-top:14px;padding:13px;border-radius:12px;background:#faf8ff;border:1px solid var(--line)}
  .needs .nh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
  .needs .ni{display:flex;gap:9px;align-items:center;font-size:12.5px;padding:4px 0}
  .needs .ni svg{width:17px;height:17px;stroke:var(--brand);flex:0 0 auto}

  .promo-mini{margin:0 0 14px;border-radius:12px;padding:11px 13px;background:linear-gradient(100deg,#efe9ff,#f6f2ff);border:1px solid #d8ccff;font-size:12px;color:#5b4b86}
  .promo-mini b{color:var(--brand-navy,#1c1440)}

  .opt{display:flex;align-items:center;gap:12px;border:1.6px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;cursor:pointer}
  .opt.sel{border-color:var(--brand);background:#faf8ff}
  .opt .oi{width:38px;height:38px;border-radius:11px;background:#EFE9FF;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
  .opt .ot{flex:1}.opt .ot .n{font-size:13.5px;font-weight:700}.opt .ot .d{font-size:11.5px;color:var(--muted);margin-top:1px}
  .opt .tick{width:22px;height:22px;border-radius:50%;border:2px solid #cfc8e6;flex:0 0 auto;position:relative}
  .opt.sel .tick{border-color:var(--brand);background:var(--brand)}
  .opt.sel .tick::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800}

  .field{margin-bottom:13px}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field .val{background:#f4f2fb;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
  .field .val .edit{font-size:11px;color:var(--brand);font-weight:700}

  /* upload / liveness */
  .drop{border:2px dashed #c9bff0;border-radius:16px;padding:22px;text-align:center;background:#faf8ff}
  .drop .di{width:48px;height:48px;border-radius:14px;background:#EFE9FF;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:23px}
  .drop .dt{font-size:14px;font-weight:700}
  .drop .dd{font-size:11.5px;color:var(--muted);margin:4px 0 14px}
  .drop .act{background:var(--brand);color:#fff;border:0;border-radius:11px;padding:11px 18px;font-size:13.5px;font-weight:700;cursor:pointer}
  .drop.done{border-style:solid;border-color:rgba(18,183,106,.5);background:#f0fbf5}
  .drop.done .di{background:rgba(18,183,106,.14);color:var(--pos)}
  .kyc{display:flex;align-items:center;gap:7px;justify-content:center;margin-top:12px;font-size:10.5px;color:var(--muted)}
  .kyc .dot{width:6px;height:6px;border-radius:50%;background:var(--pos)}
  .prgbar{height:6px;border-radius:6px;background:#e8e2f6;overflow:hidden;margin:12px 0 4px;display:none}
  .prgbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand-2),var(--brand));transition:width .1s}
  .liveorb{width:150px;height:150px;border-radius:50%;margin:6px auto 0;background:radial-gradient(circle at 50% 40%,#efe9ff,#e2d7fb);border:3px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
  .liveorb.scan{border-color:var(--brand)}
  .liveorb .ringpulse{position:absolute;inset:-3px;border-radius:50%;border:3px solid var(--brand);opacity:0}
  .liveorb.scan .ringpulse{animation:orb 1.1s infinite}
  @keyframes orb{0%{transform:scale(.9);opacity:.7}100%{transform:scale(1.15);opacity:0}}
  .liveorb.done{background:radial-gradient(circle at 50% 40%,#e7fbf1,#d2f5e3);border-color:var(--pos)}

  .review .rrow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .review .rrow .k{color:var(--muted)}.review .rrow .v{font-weight:700;text-align:right}
  .signpad{border:1.6px solid var(--line);border-radius:14px;height:120px;display:flex;align-items:center;justify-content:center;background:#faf8ff;position:relative;overflow:hidden}
  .signpad .ph{color:#b9b1d6;font-size:13px}
  .signpad.signed{border-color:rgba(18,183,106,.5);background:#f0fbf5}
  .signature{font-family:'Segoe Script','Bradley Hand',cursive;font-size:30px;color:var(--brand-navy,#1c1440);opacity:0;transition:opacity .5s}
  .signpad.signed .signature{opacity:1}.signpad.signed .ph{display:none}

  .success{text-align:center;padding-top:8px}
  .success .big{width:74px;height:74px;border-radius:50%;background:rgba(18,183,106,.14);color:var(--pos);display:flex;align-items:center;justify-content:center;font-size:38px;margin:6px auto 12px}
  .success h2{font-size:21px}
  .success .card{margin-top:14px;border-radius:14px;padding:14px;background:linear-gradient(135deg,var(--brand-2),var(--brand));color:#fff;text-align:left}
  .success .card .l{font-size:11px;opacity:.85}.success .card .n{font-size:16px;font-weight:800;margin-top:2px}
  .success .card .r{font-size:12px;opacity:.92;margin-top:8px;border-top:1px solid rgba(255,255,255,.25);padding-top:8px}

  /* footer CTA */
  .footcta{position:absolute;left:0;right:0;bottom:0;padding:14px 16px 24px;background:linear-gradient(180deg,rgba(255,255,255,0),#fff 30%);flex:0 0 auto}
  .cta{width:100%;background:var(--brand);color:#fff;border:0;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
  .cta:hover{background:var(--brand-dk)}
  .cta[disabled]{background:#cfc7e6;cursor:not-allowed}

  /* floating Ada + bottom-sheet chat */
  .fab{position:absolute;right:16px;bottom:88px;z-index:70;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--brand-2),var(--brand));border:0;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(91,44,224,.5);cursor:pointer}
  .fab svg{width:24px;height:24px}
  .fab .badge{position:absolute;top:-3px;right:-3px;width:19px;height:19px;border-radius:50%;background:var(--pos);border:2px solid #fff;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .fab.hidden{opacity:0;pointer-events:none;transform:scale(.6)}

  .scrim{position:absolute;inset:0;z-index:74;background:rgba(20,15,45,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .3s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;height:76%;z-index:76;background:#fff;border-radius:24px 24px 0 0;display:flex;flex-direction:column;overflow:hidden;
         box-shadow:0 -16px 44px rgba(0,0,0,.3);transform:translateY(106%);transition:transform .38s cubic-bezier(.32,1.02,.4,1)}
  .sheet.open{transform:none}
  .grab{width:38px;height:5px;border-radius:3px;background:#e2ddf0;margin:9px auto 2px;flex:0 0 auto}
  .shead{display:flex;align-items:center;gap:10px;padding:6px 15px 11px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .shead .av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand-2),var(--brand));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
  .shead .t{flex:1}.shead .t .n{font-size:13.5px;font-weight:700}.shead .t .s{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .shead .t .s i{width:6px;height:6px;border-radius:50%;background:#38d39f;display:inline-block}
  .shead .x{background:#f1eef8;border:0;width:28px;height:28px;border-radius:50%;font-size:16px;color:#6b6784;cursor:pointer}
  .sbody{flex:1;overflow-y:auto;padding:13px 14px;display:flex;flex-direction:column;gap:9px;background:var(--bg)}
  .msg{max-width:88%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45}
  .bot{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .user{align-self:flex-end;background:linear-gradient(135deg,var(--brand-2),var(--brand));color:#fff;border-bottom-right-radius:4px}
  .typing{align-self:flex-start;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 13px;display:flex;gap:4px}
  .typing i{width:6px;height:6px;border-radius:50%;background:#b9aaff;animation:bl 1.2s infinite}.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .schips{display:flex;flex-wrap:wrap;gap:7px;padding:8px 14px 2px;background:var(--bg);flex:0 0 auto}
  .schip{background:#fff;border:1.5px solid var(--brand);color:var(--brand);border-radius:999px;padding:7px 11px;font-size:11.5px;font-weight:600;cursor:pointer}
  .schip:hover{background:#f1eefb}
  .sinput{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fff;flex:0 0 auto}
  .sinput input{flex:1;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-size:13px;outline:none;background:#faf8fe}
  .sinput input:focus{border-color:var(--brand)}
  .sinput button{background:var(--brand);border:0;color:#fff;border-radius:50%;width:38px;height:38px;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
  <div class="viewswitch">
    <a href="index.html">Web</a><a href="custom.html">Custom</a><a href="messaging.html">Messaging</a><a href="app.html">Mobile</a><a href="voice.html">Voice</a>
  </div>
  <div class="hint">The customer opened this on their phone · tap the <b>Ada</b> button on any step &rarr;</div>

  <div class="phone">
    <div class="island"></div>
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span class="r">&#9679;&#9679;&#9679; &#128246; <span class="bat"></span></span></div>
      <div class="urlbar"><span class="lock">&#128274;</span><span class="u">adabank.com/open</span><span>&#8635;</span></div>

      <div class="apphead">
        <div class="approw"><div class="mark">a</div><div class="lg">ada<span> banking</span></div><a class="close" href="new-account.html" title="Exit">&times;</a></div>
        <div class="prog">
          <div class="ring"><svg width="34" height="34"><circle cx="17" cy="17" r="14" fill="none" stroke="#ece9f5" stroke-width="4"/><circle id="ringP" cx="17" cy="17" r="14" fill="none" stroke="#5B2CE0" stroke-width="4" stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="88"/></svg><div class="t" id="ringT">1/9</div></div>
          <div class="pt" id="stepName">Getting started<small id="stepSub">Open your Ada Bank account</small></div>
        </div>
      </div>

      <div class="appbody"><div class="step" id="stepBody"></div></div>

      <div class="footcta"><button class="cta" id="cta" onclick="next()">Continue</button></div>

      <!-- floating Ada -->
      <button class="fab" id="fab" onclick="openChat()" aria-label="Chat with Ada"><span class="badge" id="fabBadge">1</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </button>
      <div class="scrim" id="scrim" onclick="closeChat()"></div>
      <div class="sheet" id="sheet">
        <div class="grab"></div>
        <div class="shead"><div class="av">a</div><div class="t"><div class="n">Ada</div><div class="s"><i></i> Helping you open your account</div></div><button class="x" onclick="closeChat()">&times;</button></div>
        <div class="sbody" id="sbody"></div>
        <div class="schips" id="schips"></div>
        <form class="sinput" onsubmit="onSend(event)"><input id="stext" placeholder="Ask Ada anything…" autocomplete="off"><button type="submit" aria-label="Send"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></form>
      </div>
    </div>
  </div>

<script>
// ================= STEPS =================
var STEPS=[
 {name:"Getting started",sub:"Before you begin",cta:"I'm ready",html:
   "<h2>Before you start</h2><p class='sub'>Opening your account takes about 10 minutes. Make sure the below applies to you.</p>"+
   "<div class='check'><span class='ok'>✓</span><div>You are <b>over 18</b> and a UK resident</div></div>"+
   "<div class='check'><span class='ok'>✓</span><div>You pay tax in the <b>UK</b> and aren't a US person</div></div>"+
   "<div class='check'><span class='ok'>✓</span><div>You're a <b>new</b> Ada Bank customer</div></div>"+
   "<div class='needs'><div class='nh'>Have these ready</div>"+
   "<div class='ni'><svg viewBox='0 0 24 24' fill='none' stroke-width='2'><rect x='3' y='4' width='18' height='16' rx='2'/><circle cx='9' cy='10' r='2'/></svg> Your passport or driving licence</div>"+
   "<div class='ni'><svg viewBox='0 0 24 24' fill='none' stroke-width='2'><rect x='7' y='2' width='10' height='20' rx='2'/></svg> This phone, with its camera</div>"+
   "<div class='ni'><svg viewBox='0 0 24 24' fill='none' stroke-width='2'><circle cx='12' cy='12' r='4'/><path d='M12 2v2M12 20v2M2 12h2M20 12h2'/></svg> Good lighting for the ID check</div></div>"},

 {name:"Choose account",sub:"Step 2 · your products",cta:"Continue",html:
   "<h2>Choose your account</h2><p class='sub'>Start with the fee-free online account. Add extras now or later.</p>"+
   "<div class='promo-mini'>🎁 <b>£150 welcome bonus</b> — pay in a £1,000+ salary within 60 days.</div>"+
   "<div class='opt sel'><div class='oi'>💳</div><div class='ot'><div class='n'>Online Current Account</div><div class='d'>No monthly fee · free debit card</div></div><div class='tick'></div></div>"+
   "<div class='opt sel'><div class='oi'>💠</div><div class='ot'><div class='n'>Ada Credit Card</div><div class='d'>Optional · subject to status</div></div><div class='tick'></div></div>"+
   "<div class='opt'><div class='oi'>📈</div><div class='ot'><div class='n'>Investment account</div><div class='d'>Optional · add later</div></div><div class='tick'></div></div>"},

 {name:"Create login",sub:"Step 3 · your login",cta:"Continue",html:
   "<h2>Create your login</h2><p class='sub'>You'll use these to sign in to Ada Bank.</p>"+
   "<div class='field'><label>Email (username)</label><div class='val'>richard.kirk@gmail.com <span class='edit'>Edit</span></div></div>"+
   "<div class='field'><label>Passcode</label><div class='val'>•••••••• <span class='edit'>Show</span></div></div>"+
   "<div class='field'><label>Confirm passcode</label><div class='val'>••••••••</div></div>"+
   "<p class='sub' style='margin-top:2px'>Already started? You can resume anytime from the link we emailed you.</p>"},

 {name:"Your details",sub:"Step 4 · about you",cta:"Continue",html:
   "<h2>Your details</h2><p class='sub'>This verifies who you are and meets banking regulations.</p>"+
   "<div class='field'><label>Full name</label><div class='val'>Richard Kirk</div></div>"+
   "<div class='field'><label>Date of birth</label><div class='val'>12 April 1987</div></div>"+
   "<div class='field'><label>Home address</label><div class='val'>24 King's Road, London SW3 4TE</div></div>"+
   "<div class='field'><label>Country of tax residence</label><div class='val'>United Kingdom</div></div>"+
   "<div class='field'><label>Mobile</label><div class='val'>+44 7700 900461</div></div>"},

 {name:"Verify identity",sub:"Step 5 · your document",cta:"Continue",gate:true,html:
   "<h2>Verify your identity</h2><p class='sub'>Upload a clear photo of your passport or driving licence.</p>"+
   "<div class='drop' id='drop'><div class='di' id='dropIc'>🪪</div><div class='dt' id='dropT'>Passport or driving licence</div><div class='dd' id='dropD'>Make sure all four corners are visible and text is sharp.</div>"+
   "<button class='act' id='dropBtn' onclick='doUpload()'>📷 Take photo</button>"+
   "<div class='prgbar' id='prg'><i></i></div></div>"+
   "<div class='kyc'><span class='dot'></span> Encrypted &amp; checked by our regulated identity partner</div>"},

 {name:"Liveness check",sub:"Step 6 · it's really you",cta:"Continue",gate:true,html:
   "<h2>Quick selfie check</h2><p class='sub'>A 10-second video confirms it's really you — not a photo. Look at the circle.</p>"+
   "<div class='liveorb' id='orb'><div class='ringpulse'></div><span id='orbFace'>🙂</span></div>"+
   "<div style='text-align:center;margin-top:14px'><button class='act' id='liveBtn' onclick='doLive()' style='background:#5B2CE0;color:#fff;border:0;border-radius:11px;padding:11px 18px;font-size:13.5px;font-weight:700;cursor:pointer'>Start check</button></div>"+

// ============= scripted answer bank =============
function answer(q){var s=q.toLowerCase();
 if(/promo|£150|150|bonus|offer/.test(s)) return "You'll get a <b>£150 welcome bonus</b> when you open the online account and pay in a salary of <b>£1,000+ within 60 days</b>. It lands within 30 days of qualifying and I'll show you exactly how to claim it at the end. New customers only, one per person, T&Cs apply.";
 if(/eligible|18|resident|qualify/.test(s)) return "You're eligible if you're <b>18+</b>, a <b>UK resident</b> who pays UK tax, not a US person, and new to Ada Bank. You tick all of these 👍";
 if(/why.*document|document.*need|why.*passport|need.*id|why is this document/.test(s)) return "We're legally required to confirm your identity before opening an account (KYC / anti-money-laundering rules). A government photo ID lets our regulated partner check you're really you — it protects you from fraud too. It's used only for verification.";
 if(/accept|which doc|what doc|kind of id|use as id|what can i use/.test(s)) return "A valid <b>passport</b> or <b>UK photo driving licence</b> works best. Make sure the whole document is in frame, in focus, and glare-free.";
 if(/photo.*fail|fail|blurry|won.?t accept|not work.*photo|reject/.test(s)) return "Usually it's lighting or focus. Lay the ID flat on a dark surface, avoid glare, fill the frame, and hold steady. If it still fails after 3 tries I'll flag it so you're not stuck — you won't lose your progress.";
 if(/store|stored|secure|safe|data|privacy|gdpr|protect/.test(s)) return "Everything is encrypted in transit and at rest. Your ID and selfie are handled by our <b>regulated identity partner</b>, used only to verify you, and biometric data is deleted after the check. I never ask for your passcode or one-time codes.";
 if(/video|selfie|liveness|record/.test(s)) return "The short video is a <b>liveness check</b> — it confirms a real person is present (not a photo or deepfake) and that your face matches your ID. It takes about 10 seconds and is the most secure part of the process.";
 if(/camera|not working|no camera|permission/.test(s)) return "Make sure you've allowed camera access for adabank.com in your browser, then tap <b>Start check</b> again. Bright, even lighting and holding the phone at eye level works best.";
 if(/biometric/.test(s)) return "Your biometric data is processed only to match your face to your ID, encrypted throughout, and <b>deleted once verification completes</b>. We keep only the pass/fail result.";
 if(/how long|time|take|verify.*time/.test(s)) return "The ID and selfie checks are usually <b>instant to a minute</b>. If a manual review is ever needed it's typically under a few hours, and I'll keep you posted.";
 if(/address|why.*address/.test(s)) return "Your address is a regulatory requirement and is where we'll send your card and statements. It's also used to help protect your account from fraud.";
 if(/tax|residency|residence/.test(s)) return "Banks must record your country of tax residence (CRS/FATCA rules). For most UK customers that's simply the United Kingdom.";
 if(/resume|later|save|pause|come back/.test(s)) return "Yes — your progress is saved. You can close this and resume from the secure link we emailed you, right where you left off.";
 if(/card can|what card|credit card|debit/.test(s)) return "Your online account comes with a <b>free debit card</b>. You can add an <b>Ada Credit Card</b> (subject to status) in this same application, and an <b>investment account</b> now or later.";
 if(/invest|securities/.test(s)) return "The investment account lets you buy and hold investments alongside your banking. It's optional — you can skip it now and open it in seconds later from the app.";
 if(/fee|cost|charge/.test(s)) return "The online current account has <b>no monthly fee</b> and the debit card is free. I'll always flag any optional product that has a cost before you add it.";
 if(/cnae|sic|activity code/.test(s)) return "A SIC/CNAE code classifies your business activity for regulatory records. If you're self-employed, tell me what you do and I'll suggest the right code — no need to look it up.";
 if(/self.?employed|self employed/.test(s)) return "If you're self-employed we'll note your business activity (SIC/CNAE) and the account can be used professionally. It only adds a question or two — I'll guide you.";
 if(/source of funds|money from|where.*money/.test(s)) return "'Source of funds' just means where the money you'll pay in comes from — for most people that's their <b>salary</b>. It's a standard regulatory question.";
 if(/job|work|profession|occupation|why.*job/.test(s)) return "Regulations require banks to understand customers' occupation and source of funds, to prevent financial crime and to tailor the right products to you.";
 if(/edit|change|wrong|correct/.test(s)) return "Yes — tap any field on the review screen to change it before you sign. Nothing is final until you sign the contract.";
 if(/after.*confirm|what happens|next step/.test(s)) return "After you confirm, you'll sign your contract on this phone and your account opens instantly. Your card is posted within 3–5 working days.";
 if(/cooling|cancel|14 day|change my mind/.test(s)) return "You have a <b>14-day cooling-off period</b> — you can close the account within 14 days with no penalty. Just ask me and I'll handle it.";
 if(/sign|signature|e-sign|legally/.test(s)) return "The digital signature is legally equivalent to a handwritten one. You're agreeing to the Account Terms, Fee Information and Privacy Notice — I can summarise any of those in plain English.";
 if(/agree|terms|contract/.test(s)) return "You're agreeing to open the account under the Account Terms, the Fee Information (no monthly fee), and the Privacy Notice. Want the key points in a sentence?";
 if(/card arrive|when.*card|delivery/.test(s)) return "Your debit card is posted to your home address and typically arrives in <b>3–5 working days</b>. You can also add it to Apple/Google Pay straight away to spend immediately.";
 if(/claim.*150|claim.*promo|claim|how.*bonus/.test(s)) return "Nothing to do now — just pay in a salary of <b>£1,000+ within 60 days</b> and the <b>£150</b> is paid automatically within 30 days. I'll send a reminder if it's getting close.";
 if(/salary|direct deposit|pay in/.test(s)) return "In the app go to <b>your account → set up salary</b>, or share your new sort code and account number with your employer/HR. That also qualifies you for the £150 bonus.";
 if(/what can ada|explore|do for me|help with/.test(s)) return "Day to day I can check balances, move money, freeze cards, explain a charge, or open new products — all by chat or voice, 24/7.";
 return "Good question. I can help with the promotion, why we ask for each piece of information, your documents and the identity check, security, or what happens next. What would help most?";
}

// ============= engine =============
var idx=0, seen=[], body, chips, lastGreetStep=-1;
function fmtCta(h){return h;}
function render(){
  var st=STEPS[idx];
  document.getElementById('stepBody').innerHTML=st.html;
  document.getElementById('stepName').innerHTML=st.name+"<small>"+st.sub+"</small>";
  document.getElementById('ringT').textContent=(idx+1)+"/"+STEPS.length;
  var off=88-(88*((idx+1)/STEPS.length)); document.getElementById('ringP').setAttribute('stroke-dashoffset',off);
  var cta=document.getElementById('cta');
  if(!st.cta){cta.style.display='none';}
  else{cta.style.display='';cta.innerHTML=st.cta;cta.disabled=!!st.gate; if(st.gate)cta.dataset.gated="1"; else delete cta.dataset.gated;}
  document.getElementById('appbodyScroll');
  document.querySelector('.appbody').scrollTop=0;
}
function next(){ if(idx<STEPS.length-1){idx++;render();} }
function ungate(){var c=document.getElementById('cta');c.disabled=false;}

// upload / liveness / sign simulations
function doUpload(){var d=document.getElementById('drop'),b=document.getElementById('dropBtn'),p=document.getElementById('prg'),bar=p.querySelector('i');
  b.style.display='none';p.style.display='block';var w=0;var t=setInterval(function(){w+=8;bar.style.width=w+'%';if(w>=100){clearInterval(t);
    d.classList.add('done');document.getElementById('dropIc').textContent='✓';document.getElementById('dropT').textContent='Document received';document.getElementById('dropD').textContent='Passport · verified by our identity partner';p.style.display='none';ungate();}},90);}
function doLive(){var o=document.getElementById('orb'),b=document.getElementById('liveBtn');b.style.display='none';o.classList.add('scan');
  setTimeout(function(){o.classList.remove('scan');o.classList.add('done');document.getElementById('orbFace').textContent='✓';ungate();},2600);}
function doSign(){var s=document.getElementById('signpad');s.classList.add('signed');ungate();}

// chat
function openChat(){document.getElementById('scrim').classList.add('open');document.getElementById('sheet').classList.add('open');
  document.getElementById('fab').classList.add('hidden');document.getElementById('fabBadge').style.display='none';
  body=document.getElementById('sbody');chips=document.getElementById('schips');
  if(lastGreetStep!==idx){lastGreetStep=idx;setTimeout(function(){greet(idx);},250);}}
function closeChat(){document.getElementById('scrim').classList.remove('open');document.getElementById('sheet').classList.remove('open');document.getElementById('fab').classList.remove('hidden');}
function add(cls,html){var d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;body.appendChild(d);body.scrollTop=body.scrollHeight;}
function typing(){var d=document.createElement('div');d.className='typing';d.innerHTML='<i></i><i></i><i></i>';body.appendChild(d);body.scrollTop=body.scrollHeight;return d;}
function botAfter(delay,html,cb){var t=typing();setTimeout(function(){t.remove();add('bot',html);if(cb)cb();},delay);}
function setChips(list){chips.innerHTML='';list.forEach(function(c){var b=document.createElement('button');b.className='schip';b.textContent=c;b.onclick=function(){ask(c);};chips.appendChild(b);});}
function greet(i){add('bot',CHAT[i].g);setChips(CHAT[i].c);}
function ask(q){add('user',q);chips.innerHTML='';botAfter(950,answer(q),function(){setChips(CHAT[idx].c);});}
function onSend(e){e.preventDefault();var i=document.getElementById('stext'),t=i.value.trim();if(!t)return;i.value='';ask(t);}

render();
</script>
